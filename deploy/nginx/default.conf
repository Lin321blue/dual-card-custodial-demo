server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # K8s liveness / readiness probe
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /icons/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # demo.html kept as alias for bookmarks / old links
    location = /demo.html {
        try_files /index.html =404;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript image/svg+xml;
    gzip_min_length 256;
}
